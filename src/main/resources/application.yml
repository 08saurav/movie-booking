spring:
  application:
    name: movie-booking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/movie_booking}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    # Flyway owns the schema; Hibernate only validates that entities match it.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO

# Segment 3: hold TTL in minutes (default 10 minutes)
# Segment 4: payment mock — set always-fail=true in @TestPropertySource to test the failure path
booking:
  seat-hold-ttl-minutes: 10
  payment:
    always-fail: false
